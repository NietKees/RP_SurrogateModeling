hydra:
  job:
    chdir: True
  run:
    dir: ./outputs_pino




physics_weight: 0.1

training:
  gamma: 0.99948708
  start_lr: 0.001
  resolution: 64
  batch_size: 64
  rec_results_freq : 8
  max_epochs: 50
  max_pseudo_epochs: 256
  pseudo_epoch_sample_size: 2048

normaliser:
  permeability:
    mean: 1.25
    std_dev: .75
  darcy:
    mean: 4.52E-2
    std_dev: 2.79E-2

model:
  fno:
    in_channels: 1
    out_channels: 1
    decoder_layers: 1
    decoder_layer_size: 32
    dimension: 2
    latent_channels: 32
    num_fno_layers: 4
    num_fno_modes: 12
    padding: 9

equation: "darcy"